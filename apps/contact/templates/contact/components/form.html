{% url 'contact:submit' as submit_url %}
<form id="contact-form" data-endpoint="{{ submit_url }}" class="max-w-lg space-y-3">
    <div class="field-row-stacked">
        <label for="cf-name" data-translate="contact-name">Name</label>
        <input type="text" id="cf-name" name="name" required>
    </div>
    <div class="field-row-stacked">
        <label for="cf-email" data-translate="contact-email">Email</label>
        <input type="email" id="cf-email" name="email" required>
    </div>
    <div class="field-row-stacked">
        <label for="cf-message" data-translate="contact-message">Message</label>
        <textarea id="cf-message" name="message" rows="5" required></textarea>
    </div>
    <div class="flex justify-end">
        <button type="submit" data-translate="contact-submit">Send Message</button>
    </div>
</form>
