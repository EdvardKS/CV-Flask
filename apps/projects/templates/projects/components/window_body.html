{% page_hero 'projects-title' 'Selected projects with description and tech stack.' %}
<div id="projects-list" class="grid grid-cols-1 lg:grid-cols-3 gap-4">
    {% for project in cv_project_entries %}
    <article class="group bg-white border border-surface-border rounded-2xl p-5 shadow-card hover:shadow-hover hover:-translate-y-0.5 transition-all duration-200">
        <div class="flex items-start gap-3 mb-2">
            <div class="w-11 h-11 rounded-xl bg-accent-soft text-accent-strong border border-surface-border flex items-center justify-center flex-shrink-0">
                <i class="fa-solid fa-cube"></i>
            </div>
            <div class="min-w-0">
                <h3 class="text-base font-semibold text-ink leading-tight">{{ project.name }}</h3>
                {% if project.url %}
                    <p class="text-xs text-ink-muted mt-0.5">
                        <a class="hover:text-accent-strong break-all" href="{{ project.url }}">{{ project.url }}</a>
                    </p>
                {% endif %}
            </div>
        </div>
        <p class="text-sm text-ink-soft mt-2">{{ project.description.en }}</p>
        <div class="flex flex-wrap gap-1.5 mt-3">
            {% for tag in project.tags %}
                <span class="inline-flex items-center text-xs font-semibold px-2.5 py-1 rounded-full bg-accent-soft text-accent-strong tracking-wide">{{ tag }}</span>
            {% endfor %}
        </div>
    </article>
    {% endfor %}
</div>
