{% load static %}
<header class="sticky top-0 z-40 bg-white/85 backdrop-blur border-b border-surface-border">
    <div class="max-w-6xl mx-auto px-5 py-3 flex items-center gap-4">
        <a class="flex items-center gap-3 font-semibold text-ink hover:text-accent-strong transition" href="{% url 'cv:index' %}">
            <img src="{% static 'data/1713730445414.jpeg' %}" alt=""
                 class="w-8 h-8 rounded-full object-cover border border-surface-border">
            <span id="brand-name">Edvard K.</span>
        </a>
        <button class="md:hidden ml-auto inline-flex items-center justify-center w-10 h-10 rounded-lg border border-surface-border text-ink-soft"
                id="menu-toggle" aria-label="Menu">
            <i class="fa-solid fa-bars"></i>
        </button>
        <nav id="nav-links"
             class="hidden md:flex md:items-center md:gap-1 md:ml-auto absolute md:static top-16 inset-x-3 md:inset-auto bg-white md:bg-transparent border md:border-0 border-surface-border rounded-2xl md:rounded-none p-2 md:p-0 shadow-card md:shadow-none flex-col md:flex-row">
            {% for key, label, url_name in nav_items %}
                <a href="{% url url_name %}" data-translate="{{ label }}"
                   class="px-3 py-2 rounded-full text-sm font-medium transition
                          {% if page == key %}bg-accent-soft text-accent-strong{% else %}text-ink-soft hover:bg-surface-soft hover:text-ink{% endif %}">
                    {{ label }}
                </a>
            {% endfor %}
            {% include 'core/components/nav_actions.html' %}
        </nav>
    </div>
</header>
