{# Minimal pixel-style icons as inline SVG. Fallback: folder. #}
{% spaceless %}
<svg width="{{ size }}" height="{{ size }}" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;shape-rendering:crispEdges" aria-hidden="true">
    {% if name == 'cv' %}
        <rect x="2" y="1" width="11" height="14" fill="#fff" stroke="#000"/><rect x="4" y="3" width="7" height="1" fill="#0a246a"/><rect x="4" y="5" width="7" height="1" fill="#808080"/><rect x="4" y="7" width="7" height="1" fill="#808080"/><rect x="4" y="9" width="5" height="1" fill="#808080"/><rect x="4" y="11" width="6" height="1" fill="#808080"/>
    {% elif name == 'folder' %}
        <rect x="1" y="4" width="13" height="10" fill="#ffcc66" stroke="#000"/><rect x="1" y="3" width="5" height="2" fill="#ffcc66" stroke="#000"/><rect x="2" y="5" width="11" height="1" fill="#ffe39a"/>
    {% elif name == 'terminal' %}
        <rect x="1" y="2" width="14" height="12" fill="#000" stroke="#000"/><text x="3" y="10" fill="#33ff66" font-family="monospace" font-size="7">{% templatetag openbrace %}&gt;_{% templatetag closebrace %}</text>
    {% elif name == 'briefcase' %}
        <rect x="1" y="5" width="14" height="9" fill="#8a5a2b" stroke="#000"/><rect x="5" y="3" width="6" height="2" fill="#8a5a2b" stroke="#000"/><rect x="7" y="8" width="2" height="2" fill="#f2c94c"/>
    {% elif name == 'book' %}
        <rect x="2" y="2" width="12" height="12" fill="#c0392b" stroke="#000"/><rect x="3" y="3" width="10" height="1" fill="#fff"/><rect x="3" y="12" width="10" height="1" fill="#fff"/>
    {% elif name == 'user' %}
        <circle cx="8" cy="6" r="3" fill="#f2c94c" stroke="#000"/><rect x="3" y="10" width="10" height="5" fill="#316ac5" stroke="#000"/>
    {% elif name == 'mail' %}
        <rect x="1" y="3" width="14" height="10" fill="#fff" stroke="#000"/><polyline points="1,3 8,9 15,3" fill="none" stroke="#000"/>
    {% elif name == 'trophy' %}
        <rect x="4" y="2" width="8" height="7" fill="#f2c94c" stroke="#000"/><rect x="6" y="9" width="4" height="3" fill="#f2c94c" stroke="#000"/><rect x="3" y="12" width="10" height="2" fill="#8a5a2b" stroke="#000"/>
    {% elif name == 'computer' %}
        <rect x="1" y="2" width="14" height="9" fill="#c0c0c0" stroke="#000"/><rect x="2" y="3" width="12" height="7" fill="#5896d8"/><rect x="5" y="12" width="6" height="2" fill="#c0c0c0" stroke="#000"/>
    {% elif name == 'close' %}
        <path d="M3 3 L13 13 M13 3 L3 13" stroke="#000" stroke-width="2" fill="none"/>
    {% else %}
        <rect x="2" y="2" width="12" height="12" fill="#c0c0c0" stroke="#000"/>
    {% endif %}
</svg>
{% endspaceless %}
