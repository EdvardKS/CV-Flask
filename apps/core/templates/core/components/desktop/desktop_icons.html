<ul id="desktop-icons"
    class="absolute top-3 left-3 grid grid-cols-1 gap-1 auto-rows-min z-[5]"
    aria-label="Desktop">
    {% for w in windows %}
    <li>
        <button type="button"
                class="group w-20 p-1 flex flex-col items-center gap-1 text-white
                       rounded-sm focus:outline-none focus:bg-xp-highlight/60 hover:bg-white/10"
                data-desktop-icon
                data-window="{{ w.id }}"
                data-url="{{ w.path }}"
                data-title="{{ w.title }}"
                data-icon="{{ w.icon }}">
            <span class="block w-8 h-8 grid place-items-center drop-shadow">
                {% win_icon w.icon 32 %}
            </span>
            <span class="text-center text-[11px] leading-tight text-shadow-xp
                         group-focus:outline group-focus:outline-dotted group-focus:outline-white/80 px-0.5">
                {{ w.title }}
            </span>
        </button>
    </li>
    {% endfor %}
</ul>
