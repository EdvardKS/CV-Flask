<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redes Test Studio</title>
  <link rel="stylesheet" href="studio.css">
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div>
        <p class="eyebrow">Introduccion a las Redes Informaticas</p>
        <h1>Redes Test Studio</h1>
      </div>
      <div class="actions">
        <button id="generalBtn" class="primary" type="button">Test general Redes</button>
        <button id="shuffleBtn" type="button">Mezclar</button>
        <button id="resetBtn" type="button">Reiniciar</button>
      </div>
    </section>

    <section class="filters" aria-label="Filtros">
      <button class="chip active" data-filter-kind="all" data-filter-value="all" type="button">Todo</button>
      <button class="chip" data-filter-kind="bloque" data-filter-value="temario" type="button">Temario</button>
      <button class="chip" data-filter-kind="bloque" data-filter-value="autoevaluacion" type="button">Autoevaluacion</button>
      <button class="chip" data-filter-kind="tema" data-filter-value="UD1" type="button">UD1</button>
      <button class="chip" data-filter-kind="tema" data-filter-value="UD2" type="button">UD2</button>
      <button class="chip" data-filter-kind="tema" data-filter-value="UD3" type="button">UD3</button>
      <button class="chip" data-filter-kind="tema" data-filter-value="UD4" type="button">UD4</button>
      <button class="chip" data-filter-kind="tema" data-filter-value="UD5" type="button">UD5</button>
      <button class="chip" data-filter-kind="tema" data-filter-value="UD6" type="button">UD6</button>
    </section>

    <section class="stats" aria-live="polite">
      <article><span>Banco</span><strong id="bankCount">0</strong></article>
      <article><span>Pregunta</span><strong id="position">0/0</strong></article>
      <article><span>Contestadas</span><strong id="answered">0</strong></article>
      <article><span>Aciertos</span><strong id="correct">0</strong></article>
      <article><span>Fallos</span><strong id="wrong">0</strong></article>
      <article><span>Nota /10</span><strong id="score">0.00</strong></article>
    </section>

    <p id="status" class="status">Cargando banco maestro...</p>

    <section id="quiz" class="quiz" hidden>
      <header class="question-meta">
        <span id="source"></span>
        <span id="topic"></span>
      </header>
      <h2 id="question"></h2>
      <div id="options" class="options"></div>
      <p id="feedback" class="feedback" hidden></p>
      <footer class="nav">
        <button id="prevBtn" type="button">Anterior</button>
        <button id="nextBtn" type="button">Siguiente</button>
      </footer>
    </section>
  </main>

  <script src="studio.js"></script>
</body>
</html>
