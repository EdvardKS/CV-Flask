{% extends "base.html" %}
{% block title %}Contact — Edvard K.{% endblock %}
{% block content %}
<section class="page-hero">
    <h1 data-translate="contact-title">Contact</h1>
    <p class="lead">Drop a message — I read everything.</p>
</section>
<section class="section">
    <form id="contact-form" style="max-width:520px">
        <div class="form-row">
            <label for="name" data-translate="contact-name">Name</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-row">
            <label for="email" data-translate="contact-email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-row">
            <label for="message" data-translate="contact-message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary" data-translate="contact-submit">Send Message</button>
    </form>
</section>
{% endblock %}
