  <rect x="40" y="150" width="200" height="200" rx="14" fill="#111827" stroke="#1f2937"/>
  <text x="140" y="184" fill="#f59e0b" font-size="14" text-anchor="middle" font-weight="700">Apps</text>
  <text x="140" y="214" fill="#cbd5e1" font-size="12" text-anchor="middle">resúmenes IA</text>
