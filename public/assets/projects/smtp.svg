<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 495" font-family="system-ui,Segoe UI,sans-serif">
  <rect width="880" height="495" fill="#0f172a"/>
  <text x="40" y="56" fill="#e2e8f0" font-size="26" font-weight="700">SMTP Relay · Postfix + OpenDKIM</text>
  <text x="40" y="84" fill="#94a3b8" font-size="14">mail.iaeks.com · envío firmado (DKIM/SPF/DMARC) para todas las apps del VPS</text>
  <!-- apps -->
  <rect x="40" y="150" width="190" height="200" rx="14" fill="#111827" stroke="#1f2937"/>
  <text x="135" y="180" fill="#f59e0b" font-size="13" text-anchor="middle" font-weight="700">9 APPS</text>
  <text x="135" y="210" fill="#cbd5e1" font-size="12" text-anchor="middle">viewer · asador</text>
  <text x="135" y="232" fill="#cbd5e1" font-size="12" text-anchor="middle">gestor · basket</text>
  <text x="135" y="254" fill="#cbd5e1" font-size="12" text-anchor="middle">ailedu · pcs…</text>
  <text x="135" y="300" fill="#64748b" font-size="11" text-anchor="middle">red docker</text>
  <text x="135" y="318" fill="#38bdf8" font-size="12" text-anchor="middle" font-weight="700">mail_net</text>
  <!-- relay -->
  <rect x="345" y="150" width="220" height="200" rx="14" fill="#111827" stroke="#1f8a4e"/>
  <text x="455" y="184" fill="#58c896" font-size="15" text-anchor="middle" font-weight="700">Postfix relay</text>
  <text x="455" y="214" fill="#cbd5e1" font-size="12" text-anchor="middle">OpenDKIM (firma)</text>
  <text x="455" y="240" fill="#cbd5e1" font-size="12" text-anchor="middle">solo salida (send-only)</text>
  <text x="455" y="266" fill="#cbd5e1" font-size="12" text-anchor="middle">cola · reintentos</text>
  <text x="455" y="300" fill="#94a3b8" font-size="11" text-anchor="middle">contenedor "smtp"</text>
  <!-- internet -->
  <rect x="680" y="150" width="160" height="200" rx="14" fill="#111827" stroke="#1f2937"/>
  <text x="760" y="240" fill="#e2e8f0" font-size="15" text-anchor="middle" font-weight="700">Internet</text>
  <text x="760" y="266" fill="#94a3b8" font-size="11" text-anchor="middle">SPF · DKIM · DMARC</text>
  <!-- arrows -->
  <path d="M230 250 H345" stroke="#38bdf8" stroke-width="3" marker-end="url(#a)"/>
  <path d="M565 250 H680" stroke="#58c896" stroke-width="3" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker></defs>
  <text x="40" y="430" fill="#64748b" font-size="12">Postfix · OpenDKIM · Docker · systemd · monitorizado desde el panel (tab Correo)</text>
</svg>
