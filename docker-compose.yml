services:
  web:
    build: .
    image: edvardks-portfolio:prod
    container_name: flask
    restart: unless-stopped
    ports:
      - "5000:3000"
    environment:
      NODE_ENV: production
    env_file:
      - .env
    volumes:
      - padel_data:/app/public/padel-data
      - news_cache:/app/public/news-cache
    networks:
      - reverse_proxy
      - ollama_net

volumes:
  padel_data:
  news_cache:
networks:
  reverse_proxy:
    external: true
  ollama_net:
    external: true
