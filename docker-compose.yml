services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: edvardks-web:latest
    container_name: edvardks-web
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-edvardks.com,www.edvardks.com}
      SECRET_KEY: ${SECRET_KEY}
      SMTP_SERVER: ${SMTP_SERVER}
      SMTP_PORT: ${SMTP_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    ports:
      - "1997:8000"
    volumes:
      - ./output:/app/output
      - staticfiles:/app/staticfiles
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/robots.txt"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  staticfiles:
